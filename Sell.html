<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sell Crops - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
  color: #1f2937;
}
body.drawer-open { overflow: hidden; }

.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 78px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom: 3px solid #0a3d62;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  z-index: 9999;
}
.nav-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.hamburger-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 2px solid #0a3d62;
  background: rgba(255,255,255,0.75);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: 0.3s;
}
.hamburger-btn:hover { transform: scale(1.05); }
.hamburger-icon {
  width: 20px;
  height: 14px;
  position: relative;
}
.hamburger-icon span {
  position: absolute;
  left: 0;
  right: 0;
  height: 2.5px;
  background: #0a3d62;
  border-radius: 999px;
}
.hamburger-icon span:nth-child(1){ top:0; }
.hamburger-icon span:nth-child(2){ top:5.5px; }
.hamburger-icon span:nth-child(3){ top:11px; }

.brand-title {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 800;
  color: #0a3d62;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 15px;
}
.logout-btn {
  background: white;
  color: #0a3d62;
  border: 2px solid #0a3d62;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}
.logout-btn:hover {
  background: #0a3d62;
  color: white;
  transform: translateY(-2px);
}

.nav-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
  z-index: 9998;
}
.side-drawer {
  position: fixed;
  top: 84px;
  left: 14px;
  width: min(320px, calc(100vw - 28px));
  max-height: calc(100vh - 98px);
  overflow: auto;
  background: linear-gradient(180deg,#0a3d62,#082032);
  border: 3px solid #ffffff;
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  transform: translateX(-110%);
  transition: transform .25s ease;
  z-index: 9999;
}
.drawer-inner { padding: 14px; }
body.drawer-open .nav-overlay { opacity: 1; pointer-events: auto; }
body.drawer-open .side-drawer { transform: translateX(0); }

.menu-section {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
  margin-bottom: 14px;
  background: rgba(255,255,255,0.05);
}
.menu-section-title {
  padding: 12px 14px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-weight: 800;
  font-size: 0.95rem;
}
.menu-list { list-style: none; padding: 0; margin: 0; }
.menu-list a {
  display: block;
  padding: 14px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  transition: 0.2s ease;
}
.menu-list li + li a { border-top: 1px solid rgba(255,255,255,0.1); }
.menu-list a:hover { background: #1e3a8a; padding-left: 20px; }

.container { max-width: 800px; margin: 120px auto 50px; padding: 0 20px; }
.sell-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-top: 8px solid #ff9933; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.full-width { grid-column: span 2; }
.sell-card h2 { margin-top: 0; color: #0a3d62; text-align: center; margin-bottom: 30px; }
label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; }
input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; box-sizing: border-box; }
input:focus { border-color: #0a3d62; outline: none; }
.submit-btn { width: 100%; padding: 16px; background: #138808; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; }
.submit-btn:hover { background: #0e6306; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(19,136,8,0.2); }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn">
      <div class="hamburger-icon"><span></span><span></span><span></span></div>
    </button>
    <p class="brand-title">Krishi Mitr</p>
  </div>
  <div class="nav-right">
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="nav-overlay" id="navOverlay" hidden></div>
<nav class="side-drawer" id="sideNav" hidden>
  <div class="drawer-inner">
    <div class="menu-section">
      <div class="menu-section-title">Main</div>
      <ul class="menu-list">
        <li><a href="Dashboard">Dashboard</a></li>
      </ul>
    </div>
    <div class="menu-section" id="marketSection" style="display:none;">
      <div class="menu-section-title">Market</div>
      <ul class="menu-list">
        <li><a href="Update_crops">Manage Your Crops</a></li>
          <li class="farmer-only" style="display:none;"><a href="tools_rental.html">List Tool for Rent</a></li>
        <li class="farmer-only" style="display:none;"><a href="my_listings.html">My Tool Inventory</a></li>
      </ul>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">Tools & Services</div>
      <ul class="menu-list">
        <li><a href="Buy">Buy Crops</a></li>
        <li><a href="browse_tools.html">Rent Tools & Machinery</a></li>
        <li><a href="krishimitr">Crop Predictor</a></li>
        <li><a href="advisor">Crop Advisor</a></li>
      </ul>
    </div>
    <div class="menu-section" style="margin-bottom:0;">
      <div class="menu-section-title">System</div>
      <ul class="menu-list">
        <li class="farmer-only" style="display:none;"><a href="Notification">Notification</a></li>
        <li><a href="Chat">Chat</a></li>
        <li ><a href="ML">Plant Disease Detector</a></li>

      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <div class="sell-card">
    <h2>List Your Crop</h2>
    <form id="sellForm" class="form-grid">
      <div>
        <label>Farmer Name</label>
        <input type="text" id="farmerName" required readonly>
      </div>
      <div>
        <label>Crop Name</label>
        <input type="text" id="cropName" placeholder="e.g. Basmati Rice" required>
      </div>
      <div>
        <label>Crop Category</label>
        <select id="cropCategory">
          <option>Cereals</option>
          <option>Vegetables</option>
          <option>Fruits</option>
          <option>Pulses</option>
          <option>Oilseeds</option>
          <option>Spices</option>
        </select>
      </div>
      <div>
        <label>Total Quantity (kg)</label>
        <input type="number" id="quantity" required>
      </div>
      <div>
        <label>Min Order (kg)</label>
        <input type="number" id="minQuantity" required>
      </div>
      <div>
        <label>Price per kg (₹)</label>
        <input type="number" id="price" required>
      </div>
      <div>
        <label>Quality Grade</label>
        <select id="quality">
          <option>Premium (A+)</option>
          <option>High (A)</option>
          <option>Standard (B)</option>
        </select>
      </div>
      <div>
        <label>Harvest Date</label>
        <input type="date" id="harvestDate" required>
      </div>
      <div>
        <label>Available Until</label>
        <input type="date" id="availableUntil" required>
      </div>
      <div>
        <label>Delivery/Pickup</label>
        <select id="deliveryType">
          <option>Self Pickup</option>
          <option>Farmer Delivery</option>
          <option>Negotiable</option>
        </select>
      </div>
      <div class="full-width">
        <label>Location (City/Village)</label>
        <input type="text" id="cropLocation" required>
      </div>
      <div class="full-width">
        <label>Contact Info</label>
        <input type="text" id="contactInfo" required>
      </div>
      <div class="full-width">
        <label>Additional Description</label>
        <textarea id="description" rows="3"></textarea>
      </div>
      <div class="full-width">
        <button type="submit" class="submit-btn">List Crop for Sale</button>
      </div>
    </form>
  </div>
</div>

<script>
const db = window.db;
const loginid = sessionStorage.getItem("loginid");
const usertype = sessionStorage.getItem("usertype");

if(!loginid){ location.href="login"; }

async function loadFarmer(){
  const { data } = await db.from("logindata").select("name").eq("loginid", loginid).single();
  if(data) document.getElementById("farmerName").value = data.name;
}

function applyRolePermissions() {
  if (usertype === "Farmer") {
    document.getElementById("marketSection").style.display = "block";
    document.querySelectorAll(".farmer-only").forEach(el => el.style.display = "block");
  }
}

const menuBtn = document.getElementById("menuBtn");
const sideNav = document.getElementById("sideNav");
const navOverlay = document.getElementById("navOverlay");

function openDrawer(){
  document.body.classList.add("drawer-open");
  sideNav.hidden=false;
  navOverlay.hidden=false;
}

function closeDrawer(){
  document.body.classList.remove("drawer-open");
  setTimeout(()=>{
    if(!document.body.classList.contains("drawer-open")){
      sideNav.hidden=true;
      navOverlay.hidden=true;
    }
  },220);
}

menuBtn.onclick = ()=>{ document.body.classList.contains("drawer-open") ? closeDrawer() : openDrawer(); };
navOverlay.onclick = closeDrawer;

document.getElementById("logoutBtn").onclick = ()=>{ sessionStorage.clear(); location.href="login"; };

document.getElementById("sellForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const { error } = await db.from("crop_sales").insert({
    farmer_name: farmerName.value,
    crop_name: cropName.value,
    crop_category: cropCategory.value,
    quantity: quantity.value,
    min_quantity: minQuantity.value,
    price: price.value,
    quality: quality.value,
    harvest_date: harvestDate.value,
    available_until: availableUntil.value,
    delivery_type: deliveryType.value,
    location: cropLocation.value,
    contact_info: contactInfo.value,
    description: description.value,
    jid: crypto.randomUUID(),
    lid: loginid
  });
  if(error){ alert(error.message); } 
  else { alert("Crop listed successfully"); e.target.reset(); loadFarmer(); }
});

applyRolePermissions();
loadFarmer();
</script>
</body>
</html>
