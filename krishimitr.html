<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KrishiMitr — Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(to bottom, #FF9933 0%, #FFFFFF 50%, #138808 100%);
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 80px;
        }
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 78px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            background: linear-gradient(90deg, #ff9933, #ffffff, #138808);
            border-bottom: 3px solid #0a3d62;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            z-index: 9999;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .hamburger-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 2px solid #0a3d62;
            background: rgba(255, 255, 255, 0.75);
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .hamburger-icon {
            width: 20px;
            height: 14px;
            position: relative;
        }
        .hamburger-icon span {
            position: absolute;
            left: 0;
            right: 0;
            height: 2.5px;
            background: #0a3d62;
            border-radius: 999px;
        }
        .hamburger-icon span:nth-child(1) { top: 0; }
        .hamburger-icon span:nth-child(2) { top: 5.5px; }
        .hamburger-icon span:nth-child(3) { top: 11px; }
        .brand-title {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 800;
            color: #0a3d62;
        }
        .logout-btn {
            background: white;
            color: #0a3d62;
            border: 2px solid #0a3d62;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid #000000;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #000080;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #000000;
            border-radius: 8px;
        }
        #horizon {
            width: 100%;
            height: 6px;
            margin: 8px 0;
            cursor: pointer;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-primary { background: #16A34A; color: white; }
        .btn-info { background: #06B6D4; color: #000; }
        .chart-container { position: relative; height: 400px; margin: 20px 0; }
        .side-drawer {
            position: fixed;
            top: 84px;
            left: 14px;
            width: 280px;
            background: white;
            border: 3px solid #0a3d62;
            border-radius: 18px;
            transform: translateX(-120%);
            transition: transform .25s ease;
            z-index: 9999;
            padding: 15px;
        }
        body.drawer-open .side-drawer { transform: translateX(0); }
        .menu-list { list-style: none; padding: 0; }
        .menu-list a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #0a3d62;
            font-weight: 800;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-left">
            <button class="hamburger-btn" id="menuBtn">
                <div class="hamburger-icon"><span></span><span></span><span></span></div>
            </button>
            <p class="brand-title">Krishi Mitr | Predictor</p>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <nav class="side-drawer" id="sideNav">
        <div class="menu-list">
            <a href="predictor.html">Price Predictor</a>
            <a href="advisor.html">Crop Advisor</a>
            <a href="Dashboard">Dashboard</a>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <h4>Price Prediction</h4>
                    <div class="form-group">
                        <label>Select Crop</label>
                        <select id="cropSelect" class="form-control">
                            <option value="Wheat">Wheat</option>
                            <option value="Rice">Rice</option>
                            <option value="Sugarcane">Sugarcane</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Region</label>
                        <select id="regionSelect" class="form-control">
                            <option value="Punjab">Punjab</option>
                            <option value="Maharashtra">Maharashtra</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Forecast Period: <span id="hval">30</span> days</label>
                        <input type="range" id="horizon" min="7" max="90" value="30">
                    </div>
                    <button id="predictBtn" class="btn btn-primary">Predict Prices</button>
                    <button id="exportBtn" class="btn btn-info">Export CSV</button>
                </div>
                <div class="card" id="actionCard">
                    <p class="text-muted">Predictions will appear here.</p>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <h4>Price Chart</h4>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const cropBase = { Wheat: 2000, Rice: 2100, Sugarcane: 1800 };
        const volatility = { Wheat: 12, Rice: 15, Sugarcane: 10 };
        let priceChart = null;
        let lastForecast = [];

        function checkAuth() {
            if (!sessionStorage.getItem("loginid")) window.location.href = "login.html";
        }
        checkAuth();

        document.getElementById('menuBtn').onclick = () => document.body.classList.toggle('drawer-open');
        document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); location.href="login.html"; };
        document.getElementById('horizon').oninput = (e) => document.getElementById('hval').innerText = e.target.value;

        function genHistorical(crop, region) {
            const base = cropBase[crop];
            const vol = volatility[crop];
            const arr = [];
            let p = base;
            for (let i = 90; i > 0; i--) {
                p = Math.max(50, p + (Math.random() - 0.5) * vol);
                const d = new Date();
                d.setDate(d.getDate() - i);
                arr.push({ date: d.toISOString().slice(0, 10), price: Math.round(p * 10) / 10 });
            }
            return arr;
        }

        function forecastPrices(hist, days, crop) {
            const vol = volatility[crop];
            let p = hist[hist.length - 1].price;
            const preds = [];
            for (let i = 1; i <= days; i++) {
                p = Math.max(20, p + (Math.random() - 0.5) * vol);
                const d = new Date();
                d.setDate(new Date().getDate() + i);
                preds.push({ date: d.toISOString().slice(0, 10), price: Math.round(p * 10) / 10 });
            }
            return preds;
        }

        function updateChart(hist, preds) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChart) priceChart.destroy();
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hist.map(h => h.date).concat(preds.map(p => p.date)),
                    datasets: [
                        { label: 'Historical', data: hist.map(h => h.price), borderColor: '#0d6efd', fill: false },
                        { label: 'Forecast', data: new Array(hist.length).fill(null).concat(preds.map(p => p.price)), borderColor: '#198754', borderDash: [5,5], fill: false }
                    ]
                }
            });
        }

        document.getElementById('predictBtn').onclick = () => {
            const crop = document.getElementById('cropSelect').value;
            const region = document.getElementById('regionSelect').value;
            const days = parseInt(document.getElementById('horizon').value);
            const hist = genHistorical(crop, region);
            const preds = forecastPrices(hist, days, crop);
            lastForecast = preds;
            updateChart(hist, preds);
            document.getElementById('actionCard').innerHTML = `<strong>Trend:</strong> Analysis complete for ${crop} in ${region}.`;
        };

        document.getElementById('exportBtn').onclick = () => {
            if (!lastForecast.length) return alert("Predict first");
            let csv = "Date,Price\n" + lastForecast.map(p => `${p.date},${p.price}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "forecast.csv";
            a.click();
        };
    </script>
</body>
</html>
