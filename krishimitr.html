<style>
body{

.top-nav{

left:0;
right:0;
height:78px;

justify-content:space-between;

padding:0 32px;

box-shadow:0 6px 14px rgba(0,0,0,0.15);

.nav-left{

align-items:center;

.hamburger-btn{
width:44px;
height:44px;
border-radius:12px;
border:2px solid #0a3d62;
background:rgba(255,255,255,0.75);
display:grid;
place-items:center;
cursor:pointer;
}

.hamburger-icon{
width:20px;
height:14px;

}

.hamburger-icon span{

right:0;

background:#0a3d62;

}

.hamburger-icon span:nth-child(2){top:5.5px}

.brand-title{
margin:0;
font-size:1.15rem;

color:#0a3d62;
}

.brand-subtitle{
margin:0;
font-size:0.9rem;
font-weight:700;
color:rgba(10,61,98,0.8);
}

.logout-btn{
background:white;
color:#0a3d62;
border:2px solid #0a3d62;
padding:10px 22px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.nav-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
opacity:0;
pointer-events:none;
transition:opacity .2s;
z-index:9998;
}

.side-drawer{
position:fixed;
top:84px;
left:14px;
width:min(320px,calc(100vw - 28px));
background:white;
border:3px solid #0a3d62;
border-radius:18px;
transform:translateX(-110%);
transition:transform .25s;
z-index:9999;
}

.drawer-inner{padding:14px}

.menu-section-title{
padding:12px;
background:#eef2ff;
font-weight:800;
}

.menu-list{
list-style:none;
padding:0;
margin:0;
}

.menu-list a{
display:block;
padding:14px;
text-decoration:none;
color:#0a3d62;
font-weight:800;
background:#f1f5f9;
}

body.drawer-open .nav-overlay{
opacity:1;
pointer-events:auto;
}

body.drawer-open .side-drawer{
transform:translateX(0);
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border:2px solid #000;
}

.form-control{
width:100%;
padding:10px;
border:2px solid #000;
border-radius:8px;
}

#horizon{
width:100%;
height:6px;
background:#e0e0e0;
border-radius:3px;
}

.horizon-label{
display:flex;
justify-content:space-between;
}

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
background:#16A34A;
color:white;
}

.btn-info{
background:#06B6D4;
}

.chart-container{
height:400px;
}

body.dark{
background:linear-gradient(to bottom,#1a1a1a,#2d2d2d,#1a1a1a);
color:#e0e0e0;
}

body.dark .card{
background:#2d2d2d;
border-color:#4a9eff;
}

body.dark .form-control{
background:#1e1e1e;
color:#e0e0e0;
}
</style>
</head>

<body>

<div class="top-nav">
<div class="nav-left">
<button class="hamburger-btn" id="menuBtn">
<div class="hamburger-icon">
<span></span><span></span><span></span>
</div>
</button>
<div>
<p class="brand-title">Krishi Mitr</p>
</div>
</div>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="nav-overlay" id="navOverlay" hidden></div>
<nav class="side-drawer" id="sideNav" hidden>
<div class="drawer-inner">

<div class="menu-section" id="marketSection"">
<div class="menu-section-title">Market</div>
<ul class="menu-list">
<li><a href="Update_crops">Manage Your Crops</a></li>
<li><a href="Sell">Sell Your Crop</a></li>

</div>

<div class="menu-section">
<div class="menu-section-title">Tools & Services</div>
<ul class="menu-list">
<li><a href="Buy">Buy Crops</a></li>
<li><a href="browse_tools">Rent Tools & Machinery</a></li>
<li><a href="tools_rental">List Tool for Rent</a></li>
<li"><a href="my_listings">My Tool Inventory</a></li>
<li><a href="krishimitr">Crop Predictor</a></li>
</ul>

<div class="menu-section" style="margin-bottom:0;">
<div class="menu-section-title">System</div>
<ul class="menu-list">
<li><a href="Notification">Notification</a></li>

</ul>

<div class="container">

<div class="card">
<h2>Crop Price Predictor</h2>
</div>

<div class="card">

<label>Select Crop</label>
<select id="cropSelect" class="form-control">
<option>Wheat</option>
<option>Rice</option>
<option>Sugarcane</option>
<option>Cotton</option>
<option>Maize</option>
<option>Sorghum</option>
<option>Barley</option>
<option>Millet</option>
<option>Soybean</option>
<option>Groundnut</option>
<option>Tomato</option>
<option>Potato</option>
</select>

<label class="mt-3">Region</label>
<select id="regionSelect" class="form-control">
<option>Punjab</option>
<option>Haryana</option>
<option>Uttar Pradesh</option>
<option>Maharashtra</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
<option>Gujarat</option>
<option>Rajasthan</option>
</select>

<div class="horizon-label mt-3">
<label>Forecast Period</label>
<span id="hval">30</span> days
</div>

<input type="range" id="horizon" min="7" max="90" value="30">

<button id="predictBtn" class="btn btn-primary w-100 mt-3">Predict Prices</button>
<button id="exportBtn" class="btn btn-info w-100 mt-2">Export CSV</button>

</div>

<div class="card">
<div class="chart-container">
<canvas id="priceChart"></canvas>
</div>
</div>

</div>

<script>
(function(){
let retry=0
function checkAuth(){
const id=sessionStorage.getItem("loginid")
if(id)return
if(retry<10){retry++;setTimeout(checkAuth,50)}else location.href="login.html"
}
setTimeout(checkAuth,10)
})()

function initDarkMode(){
const d=localStorage.getItem("darkMode")==="true"
if(d)document.body.classList.add("dark")
}
initDarkMode()

const menuBtn=document.getElementById("menuBtn")
const sideNav=document.getElementById("sideNav")
const overlay=document.getElementById("navOverlay")

function openDrawer(){
sideNav.hidden=false
overlay.hidden=false
requestAnimationFrame(()=>document.body.classList.add("drawer-open"))
}

function closeDrawer(){
document.body.classList.remove("drawer-open")
setTimeout(()=>{
sideNav.hidden=true
overlay.hidden=true
},250)
}

menuBtn.onclick=()=>{
if(document.body.classList.contains("drawer-open"))closeDrawer()
else openDrawer()
}

overlay.onclick=closeDrawer

document.getElementById("logoutBtn").onclick=()=>{
sessionStorage.clear()
location.href="login.html"
}

const cropBase={Wheat:2000,Rice:2100,Sugarcane:1800,Cotton:2300,Maize:1600,Sorghum:1500,Barley:1400,Millet:1300,Soybean:1700,Groundnut:1600,Tomato:2000,Potato:1900}
const volatility={Wheat:12,Rice:15,Sugarcane:10,Cotton:18,Maize:14,Sorghum:13,Barley:11,Millet:10,Soybean:15,Groundnut:12,Tomato:18,Potato:16}

function genHistorical(crop,region){
const days=90
const base=cropBase[crop]
const vol=volatility[crop]
let p=base
const arr=[]
for(let i=days;i>0;i--){
p+=Math.sin(i/7)*8+(Math.random()-0.5)*vol
const d=new Date()
d.setDate(d.getDate()-i)
arr.push({date:d.toISOString().slice(0,10),price:Math.round(p)})
}
return arr
}

function forecastPrices(hist,days,crop){
const preds=[]
let p=hist[hist.length-1].price
for(let i=1;i<=days;i++){
p+=Math.sin(i/7)*6+(Math.random()-0.5)*volatility[crop]
const d=new Date()
d.setDate(new Date().getDate()+i)
preds.push({date:d.toISOString().slice(0,10),price:Math.round(p)})
}
return preds
}

let priceChart
function initChart(){
priceChart=new Chart(document.getElementById("priceChart"),{
type:"line",
data:{labels:[],datasets:[]},
options:{responsive:true}
})
}

function updateChart(hist,preds){
const labels=hist.map(h=>h.date).concat(preds.map(p=>p.date))
const histData=hist.map(h=>h.price).concat(new Array(preds.length).fill(null))
const predData=new Array(hist.length-1).fill(null).concat([hist[hist.length-1].price]).concat(preds.map(p=>p.price))
priceChart.data.labels=labels
priceChart.data.datasets=[
{label:"Historical",data:histData,borderColor:"#0d6efd"},
{label:"Forecast",data:predData,borderColor:"#198754",borderDash:[6,4]}
]
priceChart.update()
}

let lastForecast=[]
let lastCrop=""
let lastRegion=""

function runPrediction(){
const crop=document.getElementById("cropSelect").value
const region=document.getElementById("regionSelect").value
const days=parseInt(document.getElementById("horizon").value)
const hist=genHistorical(crop,region)
const preds=forecastPrices(hist,days,crop)
updateChart(hist,preds)
lastForecast=preds
lastCrop=crop
lastRegion=region
}

function exportCSV(){
if(!lastForecast.length)return
let csv="Date,Predicted Price\n"
lastForecast.forEach(p=>csv+=p.date+","+p.price+"\n")
const blob=new Blob([csv])
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download=lastCrop+"_"+lastRegion+"_forecast.csv"
a.click()
}

document.getElementById("predictBtn").onclick=runPrediction
document.getElementById("exportBtn").onclick=exportCSV
document.getElementById("horizon").oninput=e=>document.getElementById("hval").innerText=e.target.value

initChart()
</script>

</body>
</html>
