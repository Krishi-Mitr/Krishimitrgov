<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KrishiMitr — Crop Advisor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
background:linear-gradient(to bottom,#FF9933 0%,#FFFFFF 50%,#138808 100%);
background-attachment:fixed;
font-family:Arial;
margin:0;
padding-top:80px;
}

.top-nav{
position:fixed;
top:0;
left:0;
right:0;
height:78px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 32px;
background:linear-gradient(90deg,#ff9933,#ffffff,#138808);
border-bottom:3px solid #0a3d62;
}

.brand-title{
font-size:1.2rem;
font-weight:800;
color:#0a3d62;
margin:0;
}

.logout-btn{
background:white;
border:2px solid #0a3d62;
padding:10px 20px;
border-radius:10px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
border:2px solid black;
margin-bottom:20px;
}

.form-control{
width:100%;
padding:10px;
border:2px solid black;
border-radius:8px;
}

.btn-success{
background:#138808;
color:white;
padding:10px 20px;
border-radius:8px;
border:none;
}

body.dark{
background:linear-gradient(to bottom,#1a1a1a,#2d2d2d,#1a1a1a);
color:#e0e0e0;
}

body.dark .card{
background:#2d2d2d;
border-color:#4a9eff;
}

body.dark .form-control{
background:#1e1e1e;
color:#e0e0e0;
}
</style>
</head>

<body>

<div class="top-nav">
<p class="brand-title">Krishi Mitr — Crop Advisor</p>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="container">

<div class="card">

<label>Crop</label>
<select id="cropSelect" class="form-control">
<option>Wheat</option>
<option>Rice</option>
<option>Sugarcane</option>
<option>Cotton</option>
<option>Maize</option>
<option>Sorghum</option>
<option>Barley</option>
<option>Millet</option>
<option>Soybean</option>
<option>Groundnut</option>
<option>Tomato</option>
<option>Potato</option>
</select>

<label class="mt-3">Soil Type</label>
<select id="soilType" class="form-control">
<option>Loamy</option>
<option>Clayey</option>
<option>Sandy</option>
<option>Silty</option>
</select>

<label class="mt-3">Expected Rainfall (mm)</label>
<input type="number" id="rainfall" class="form-control" value="200">

<label class="mt-3">Temperature (°C)</label>
<input type="number" id="temp" class="form-control" value="25">

<button id="adviseBtn" class="btn-success w-100 mt-3">Get Farming Advice</button>

</div>

<div class="card">
<div id="advisorOutput">Click button to receive recommendations</div>
</div>

</div>

<script>
(function(){
let retry=0
function checkAuth(){
const id=sessionStorage.getItem("loginid")
const type=sessionStorage.getItem("usertype")
if(id&&type==="Farmer")return
if(retry<10){retry++;setTimeout(checkAuth,50)}else location.href="login.html"
}
setTimeout(checkAuth,10)
})()

function initDarkMode(){
const d=localStorage.getItem("darkMode")==="true"
if(d)document.body.classList.add("dark")
}
initDarkMode()

document.getElementById("logoutBtn").onclick=()=>{
sessionStorage.clear()
location.href="login.html"
}

const seedOptions={
Rice:["Flood tolerant rice","Short duration rice"],
Wheat:["Early wheat","High protein wheat"],
Cotton:["Bt cotton","Organic cotton"],
Maize:["Hybrid maize","Sweet corn"],
Sorghum:["Red sorghum","Drought sorghum"],
Barley:["Malting barley","Certified barley"],
Millet:["Finger millet","Foxtail millet"],
Soybean:["High protein soybean","Early soybean"],
Groundnut:["Spanish groundnut","Virginia groundnut"],
Tomato:["Cherry tomato","Hybrid tomato"],
Potato:["Early potato","High starch potato"],
Sugarcane:["High yield cane","Disease resistant cane"]
}

const fertOptions={
Rice:["Urea + SSP","NPK 12-32-16"],
Wheat:["NPK 10-26-26","Organic mix"],
Cotton:["Potash rich","Biofertilizer"],
Maize:["Balanced NPK","Compost mix"],
Sorghum:["NPK 12-24-12","Organic compost"],
Barley:["Farmyard manure","NPK 10-10-10"],
Millet:["Green manure","Organic compost"],
Soybean:["Rhizobium inoculant","Balanced compost"],
Groundnut:["Potash fertilizer","Biofertilizer"],
Tomato:["Liquid fertilizer","Organic mix"],
Potato:["Potassium rich","Balanced NPK"],
Sugarcane:["NPK 14-14-14","Micronutrient mix"]
}

function runAdvisor(){
const crop=document.getElementById("cropSelect").value
const soil=document.getElementById("soilType").value
const rain=document.getElementById("rainfall").value
const temp=document.getElementById("temp").value
const seed=seedOptions[crop][Math.floor(Math.random()*seedOptions[crop].length)]
const fert=fertOptions[crop][Math.floor(Math.random()*fertOptions[crop].length)]

let weather=""
if(rain<50)weather="Low rainfall expected. "
if(rain>400)weather="High rainfall expected. Ensure drainage. "

const text="Crop: "+crop+" | Soil: "+soil+" | Rain: "+rain+"mm | Temp: "+temp+"°C. "+weather+"Recommended Seed: "+seed+". Fertilizer: "+fert+"."

document.getElementById("advisorOutput").innerText=text
}

document.getElementById("adviseBtn").onclick=runAdvisor
</script>

</body>
</html>
