<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KrishiMitr — Crop Advisor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:linear-gradient(to bottom,#FF9933 0%,#FFFFFF 50%,#138808 100%);background-attachment:fixed;font-family:Arial;margin:0;padding-top:80px}
.top-nav{position:fixed;top:0;left:0;right:0;height:78px;display:flex;justify-content:space-between;align-items:center;padding:0 32px;background:linear-gradient(90deg,#ff9933,#ffffff,#138808);border-bottom:3px solid #0a3d62}
.logout-btn{background:white;color:#0a3d62;border:2px solid #0a3d62;padding:10px 22px;border-radius:10px;font-weight:700}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px;border:2px solid #000}
.form-control{width:100%;padding:10px;border:2px solid #000;border-radius:8px}
body.dark{background:#1a1a1a;color:#e0e0e0}
body.dark .card{background:#2d2d2d;border-color:#4a9eff}
</style>
</head>

<body>

<div class="top-nav">
<div>
<b>Krishi Mitr</b><br>Crop Advisor
</div>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="container">

<div class="card">
<h3>Crop Advisor</h3>
</div>

<div class="card">
<label>Select Crop</label>
<select id="cropSelect" class="form-control">
<option>Wheat</option>
<option>Rice</option>
<option>Cotton</option>
<option>Maize</option>
<option>Tomato</option>
<option>Potato</option>
</select>
</div>

<div class="card">
<label>Soil Type</label>
<select id="soilType" class="form-control">
<option>Loamy</option>
<option>Clayey</option>
<option>Sandy</option>
<option>Silty</option>
</select>
</div>

<div class="card">
<label>Rainfall (mm)</label>
<input type="number" id="rainfall" class="form-control" value="200">
</div>

<div class="card">
<label>Temperature (°C)</label>
<input type="number" id="temp" class="form-control" value="25">
</div>

<button id="adviseBtn" class="btn btn-success w-100">Get Advice</button>

<div class="card">
<div id="advisorOutput"></div>
</div>

<div class="card">
<a href="predictor.html">Switch to Crop Predictor</a>
</div>

</div>

<script>
(function(){
let retry=0
function checkAuth(){
const loginid=sessionStorage.getItem("loginid")
if(loginid) return
retry++
if(retry<10)setTimeout(checkAuth,50)
else location.href="login.html"
}
setTimeout(checkAuth,10)
})()

function initDarkMode(){
if(localStorage.getItem("darkMode")==="true")document.body.classList.add("dark")
}
initDarkMode()

const seedOptions={
Rice:["Flood tolerant rice","Short duration rice"],
Wheat:["Drought tolerant wheat","High protein wheat"],
Cotton:["Bt cotton","Organic cotton"],
Maize:["Hybrid maize","Sweet corn"],
Tomato:["Cherry tomato","Disease resistant"],
Potato:["Early potato","High starch potato"]
}

const fertOptions={
Rice:["Urea + SSP","NPK 12-32-16"],
Wheat:["NPK 10-26-26","Organic mix"],
Cotton:["Potash rich","Biofertilizer"],
Maize:["Balanced NPK","Liquid fertilizer"],
Tomato:["Organic mix","NPK 10-10-10"],
Potato:["FYM + urea","Potassium rich"]
}

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function runAdvisor(){
const crop=document.getElementById("cropSelect").value
const soil=document.getElementById("soilType").value
const rain=document.getElementById("rainfall").value
const temp=document.getElementById("temp").value
const seed=pick(seedOptions[crop]||["Local seeds"])
const fert=pick(fertOptions[crop]||["Balanced fertilizer"])
document.getElementById("advisorOutput").innerText="Crop:"+crop+" Soil:"+soil+" Rain:"+rain+"mm Temp:"+temp+"°C Seed:"+seed+" Fertilizer:"+fert
}

document.getElementById("adviseBtn").onclick=runAdvisor

document.getElementById("logoutBtn").onclick=()=>{
sessionStorage.clear()
location.href="login.html"
}
</script>

</body>
</html>
