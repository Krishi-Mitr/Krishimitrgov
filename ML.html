<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Detector - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
  margin:0;
  font-family:"Poppins",Arial;
  background: linear-gradient(180deg,#ffedd5 0%,#ffffff 50%,#dcfce7 100%);
}
body.drawer-open{overflow:hidden;}

/* NAVBAR */
.top-nav{
  position:fixed; top:0; left:0; right:0;
  height:78px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom:3px solid #0a3d62;
}

/* HAMBURGER */
.hamburger-btn{
  width:44px;height:44px;
  border-radius:12px;
  border:2px solid #0a3d62;
  background: linear-gradient(135deg,#ff9933,#fff,#138808);
  display:grid;place-items:center;
  cursor:pointer;
}
.hamburger-icon{width:22px;height:16px;position:relative;}
.hamburger-icon span{
  position:absolute;
  left:0;right:0;height:3px;
  background:#0a3d62;
  transition:.3s;
}
.hamburger-icon span:nth-child(1){top:0;}
.hamburger-icon span:nth-child(2){top:6px;}
.hamburger-icon span:nth-child(3){top:12px;}

body.drawer-open .hamburger-icon span:nth-child(1){transform:rotate(45deg);top:6px;}
body.drawer-open .hamburger-icon span:nth-child(2){opacity:0;}
body.drawer-open .hamburger-icon span:nth-child(3){transform:rotate(-45deg);top:6px;}

.nav-left{display:flex;align-items:center;gap:14px;}
.brand-title{font-weight:800;color:#0a3d62;}

.nav-right{display:flex;align-items:center;gap:15px;}

.logout-btn{
  background:linear-gradient(90deg,#ff9933,#fff,#138808);
  border:2px solid #0a3d62;
  padding:10px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.logout-btn:hover{background:#0a3d62;color:white;}

.profile-btn img{
  width:42px;height:42px;
  border-radius:50%;
  border:2px solid #0a3d62;
}

/* DRAWER */
.nav-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.3);
  opacity:0;pointer-events:none;
}
.side-drawer{
  position:fixed;
  top:84px;left:14px;
  width:300px;
  background:linear-gradient(180deg,#0a3d62,#082032);
  border-radius:18px;
  transform:translateX(-110%);
  transition:.3s;
  padding:15px;
}
body.drawer-open .nav-overlay{opacity:1;pointer-events:auto;}
body.drawer-open .side-drawer{transform:translateX(0);}

.menu-section{margin-bottom:12px;}
.menu-section-title{color:white;font-weight:bold;margin-bottom:5px;}
.menu-list a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
}
.menu-list a:hover{background:#1e3a8a;}

/* 🌿 ML CARD */
.container{
  margin-top:150px;
  display:flex;
  justify-content:center;
}
.ml-card{
  background:white;
  padding:40px;
  border-radius:20px;
  width:400px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}
.ml-card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn">
      <div class="hamburger-icon">
        <span></span><span></span><span></span>
      </div>
    </button>
    <p class="brand-title">Krishi Mitr</p>
  </div>

  <div class="nav-right">
    <div class="profile-btn">
      <img src="profile_pic.png">
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="nav-overlay" id="navOverlay"></div>

<!-- FULL DASHBOARD MENU -->
<nav class="side-drawer" id="sideNav">
  <div class="menu-section">
    <div class="menu-section-title">Market</div>
    <div class="menu-list">
      <a href="Update_crops">Manage Crops</a>
      <a href="Sell">Sell Crop</a>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-section-title">Tools & Services</div>
    <div class="menu-list">
      <a href="Buy">Buy Crops</a>
      <a href="browse_tools.html">Rent Tools</a>
      <a href="krishimitr">Crop Predictor</a>
      <a href="advisor">Crop Advisor</a>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-section-title">System</div>
    <div class="menu-list">
      <a href="Notification">Notification</a>
      <a href="Chat">Chat</a>
    </div>
  </div>
</nav>

<!-- 🌿 ML CONTENT -->
<div class="container">
  <div class="ml-card">
    <h2>🌿 Plant Disease Detector</h2>

    <input type="file" id="imageInput">
    <img id="preview">

    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>
  </div>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/DUCzqn8BH/";
let model;

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

input.onchange = ()=>{
  const reader = new FileReader();
  reader.onload = e => preview.src = e.target.result;
  reader.readAsDataURL(input.files[0]);
};

async function loadModel(){
  model = await tmImage.load(URL+"model.json",URL+"metadata.json");
}

async function analyze(){
  if(!model) await loadModel();

  result.innerText="Analyzing...";

  const prediction = await model.predict(preview);

  let best = prediction[0];
  prediction.forEach(p=>{
    if(p.probability > best.probability) best = p;
  });

  result.innerHTML = `${best.className} (${(best.probability*100).toFixed(2)}%)`;
}

/* NAV */
menuBtn.onclick=()=>document.body.classList.toggle("drawer-open");
navOverlay.onclick=()=>document.body.classList.remove("drawer-open");

logoutBtn.onclick=()=>{
  sessionStorage.clear();
  location.href="login";
};
</script>

</body>
</html>
