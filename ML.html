/* RIGHT NAV */

/* DRAWER */

<!-- 🌿 ML -->
<div class="container">
  <div class="ml-card">
    <h2>Plant Disease Detector</h2>

    <input type="file" id="imageInput">
    <img id="preview">

     <!--This is for now, <button onclick="analyze()">Analyze</button>   a -->
    <button>Coming soon </button>

    <div id="result"></div>
  </div>
</div>

<script>
const URL="https://teachablemachine.withgoogle.com/models/DUCzqn8BH/";
let model;

const input=document.getElementById("imageInput");
const preview=document.getElementById("preview");
const result=document.getElementById("result");

input.onchange=()=>{
  const reader=new FileReader();
  reader.onload=e=>preview.src=e.target.result;
  reader.readAsDataURL(input.files[0]);
};

async function loadModel(){
  model=await tmImage.load(URL+"model.json",URL+"metadata.json");
}

async function analyze(){
  if(!input.files[0]){alert("Upload image first");return;}

  result.innerText="Analyzing... ";

  if(!model) await loadModel();

  const prediction=await model.predict(preview);

  let best=prediction[0];
  prediction.forEach(p=>{
    if(p.probability>best.probability) best=p;
  });

  result.innerHTML=` ${best.className}<br>Confidence: ${(best.probability*100).toFixed(2)}%`;
}

/* NAV */
menuBtn.onclick=()=>document.body.classList.toggle("drawer-open");
navOverlay.onclick=()=>document.body.classList.remove("drawer-open");

logoutBtn.onclick=()=>{
  sessionStorage.clear();
  location.href="login";
};
  /* USER TYPE CHECK */
function checkUserType() {
  const usertype = sessionStorage.getItem("usertype");

  // If not logged in → redirect
  if (!usertype) {
    location.href = "login";
    return;
  }

  // If Farmer → show farmer menu
  if (usertype === "Farmer") {
    document.getElementById("marketSection").style.display = "block";

    document.querySelectorAll(".farmer-only").forEach(el => {
      el.style.display = "block";
    });

  } else {
    // Hide farmer-only stuff
    document.getElementById("marketSection").style.display = "none";
  }
}

// Run on page load
checkUserType();
</script>
