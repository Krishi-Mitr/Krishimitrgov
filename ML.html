<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disease Detector - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
/* SAME GLOBAL STYLE */
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
  color: #1f2937;
}
body.drawer-open { overflow: hidden; }

/* NAVBAR */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 78px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom: 3px solid #0a3d62;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  z-index: 9999;
}

.nav-left { display: flex; align-items: center; gap: 14px; }

.hamburger-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 2px solid #0a3d62;
  background: rgba(255,255,255,0.75);
  display: grid;
  place-items: center;
  cursor: pointer;
}

.hamburger-icon {
  width: 20px;
  height: 14px;
  position: relative;
}
.hamburger-icon span {
  position: absolute;
  left: 0; right: 0;
  height: 2.5px;
  background: #0a3d62;
  border-radius: 999px;
}
.hamburger-icon span:nth-child(1){ top:0; }
.hamburger-icon span:nth-child(2){ top:5.5px; }
.hamburger-icon span:nth-child(3){ top:11px; }

.brand-title {
  font-weight: 800;
  color: #0a3d62;
}

/* DRAWER */
.nav-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  transition: .2s;
}
.side-drawer {
  position: fixed;
  top: 84px;
  left: 14px;
  width: 320px;
  background: linear-gradient(180deg,#0a3d62,#082032);
  border-radius: 18px;
  transform: translateX(-110%);
  transition: .25s;
  color: white;
  padding: 14px;
}
body.drawer-open .nav-overlay { opacity: 1; pointer-events: auto; }
body.drawer-open .side-drawer { transform: translateX(0); }

.menu-list a {
  display:block;
  padding:14px;
  color:white;
  text-decoration:none;
}

/* MAIN */
.container {
  max-width: 900px;
  margin: 150px auto;
  padding: 20px;
}

/* CARD STYLE (LIKE BUY PAGE) */
.ml-card {
  background: white;
  border-radius: 25px;
  padding: 30px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
  border-top: 6px solid #ff9933;
  border-bottom: 6px solid #138808;
  text-align: center;
}

/* IMAGE */
#preview {
  max-width: 100%;
  margin-top: 15px;
  border-radius: 15px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #0a3d62;
  color: white;
  font-weight: 700;
  cursor: pointer;
}

/* RESULT BOX */
.result-box {
  margin-top: 20px;
  text-align: left;
}

.top-result {
  padding: 15px;
  border-radius: 12px;
  background: #e6f4ea;
  font-weight: bold;
  margin-bottom: 10px;
}

.prediction {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn">
      <div class="hamburger-icon">
        <span></span><span></span><span></span>
      </div>
    </button>
    <p class="brand-title">Krishi Mitr</p>
  </div>
</div>

<div class="nav-overlay" id="navOverlay"></div>

<nav class="side-drawer" id="sideNav">
  <div class="menu-list">
    <a href="Dashboard">Dashboard</a>
    <a href="Buy">Buy Crops</a>
    <a href="Sell">Sell Crops</a>
    <a href="#">Disease Detector</a>
  </div>
</nav>

<!-- ML UI -->
<div class="container">
  <div class="ml-card">
    <h2>🌿 Plant Disease Detector</h2>

    <input type="file" id="imageInput" accept="image/*">
    <img id="preview">

    <button onclick="analyze()">Analyze</button>

    <div id="result" class="result-box"></div>
  </div>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/DUCzqn8BH/";

let model;
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

/* PREVIEW */
input.onchange = () => {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => preview.src = e.target.result;
  reader.readAsDataURL(file);
};

/* LOAD MODEL */
async function loadModel() {
  model = await tmImage.load(URL + "model.json", URL + "metadata.json");
}

/* ANALYZE */
async function analyze() {
  if (!input.files[0]) return alert("Upload image first");

  result.innerHTML = "Analyzing...";

  if (!model) await loadModel();

  const predictions = await model.predict(preview);

  // SORT BEST FIRST 🔥
  predictions.sort((a,b) => b.probability - a.probability);

  let html = `
    <div class="top-result">
      🌟 Detected: ${predictions[0].className} 
      (${(predictions[0].probability*100).toFixed(2)}%)
    </div>
  `;

  predictions.forEach(p => {
    html += `
      <div class="prediction">
        ${p.className}: ${(p.probability*100).toFixed(2)}%
      </div>
    `;
  });

  result.innerHTML = html;
}

/* DRAWER */
const menuBtn = document.getElementById("menuBtn");
const sideNav = document.getElementById("sideNav");
const navOverlay = document.getElementById("navOverlay");

menuBtn.onclick = () => {
  document.body.classList.toggle("drawer-open");
};

navOverlay.onclick = () => {
  document.body.classList.remove("drawer-open");
};
</script>

</body>
</html>
