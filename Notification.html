<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #f6e2cc 0%, #f7f9f8 45%, #dceee3 100%);
  padding-top: 100px;
}

/* NAVBAR (UNCHANGED) */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0; height: 78px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg, #ff9933, #ffffff, #138808);
  border-bottom: 3px solid #0a3d62;
  z-index: 9999;
}

.brand-title { font-weight: 800; color: #0a3d62; }

/* CONTAINER */
.container {
  max-width: 800px;
  margin: auto;
  padding: 0 20px;
}

/* SECTION UI */
.section-box {
  background: white;
  border-radius: 14px;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.section-header {
  padding: 15px 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  background: #f1f5f9;
}

.section-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.section-box.active .section-content {
  max-height: 600px;
}

.arrow {
  transition: transform 0.3s;
}

.section-box.active .arrow {
  transform: rotate(180deg);
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.btn-accept {
  background: #138808;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.btn-decline {
  background: #dc2626;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top-nav">
  <p class="brand-title">Krishi Mitr</p>
</div>

<div class="container">
  <h2>Notifications</h2>

  <!-- Crop Sales -->
  <div class="section-box" id="cropSection">
    <div class="section-header" onclick="toggleSection('cropSection')">
      Crop Sales
      <span class="arrow">▼</span>
    </div>
    <div class="section-content">
      <div id="cropNotifications"></div>
    </div>
  </div>

  <!-- Tool Rental -->
  <div class="section-box" id="toolSection">
    <div class="section-header" onclick="toggleSection('toolSection')">
      Tool Rental
      <span class="arrow">▼</span>
    </div>
    <div class="section-content">
      <div style="padding:15px;">Coming Soon</div>
    </div>
  </div>
</div>

<script>
const db = window.db;
const loginid = sessionStorage.getItem("loginid");
const usertype = sessionStorage.getItem("usertype");

if (!loginid) location.href = "login";

/* TOGGLE UI */
function toggleSection(id) {
  document.getElementById(id).classList.toggle("active");
}

/* LOAD NOTIFICATIONS */
async function loadNotifications() {

  if (usertype !== "Farmer") return;

  const { data, error } = await db
    .from("buy_table")
    .select("*")
    .eq("fid", loginid)
    .eq("status", "Pending");

  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById("cropNotifications");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p style='padding:15px;'>No notifications</p>";
    return;
  }

  data.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <strong>${item.buyer_name}</strong>
      <p>
        wants to buy <b>${item.quantity}</b> kg of 
        <b>${item.cname}</b> for ₹${item.total_price}
      </p>

      <div class="actions">
        <button class="btn-accept" onclick="acceptOrder(${item.id}, ${item.cropid}, ${item.quantity}, this)">Accept</button>
        <button class="btn-decline" onclick="declineOrder(${item.id}, this)">Decline</button>
      </div>
    `;

    container.appendChild(card);
  });
}

/* ACCEPT */
async function acceptOrder(buyId, cropId, qty, btn) {

  btn.disabled = true;

  // update buy_table
  await db
    .from("buy_table")
    .update({
      status: "Confirmed",
      is_confirmed: true
    })
    .eq("id", buyId);

  // get crop
  const { data: crop } = await db
    .from("crop_sales")
    .select("quantity")
    .eq("id", cropId)
    .single();

  const newQty = Math.max(0, crop.quantity - qty);

  await db
    .from("crop_sales")
    .update({ quantity: newQty })
    .eq("id", cropId);

  loadNotifications();
}

/* DECLINE */
async function declineOrder(buyId, btn) {

  btn.disabled = true;

  await db
    .from("buy_table")
    .update({
      status: "Declined",
      is_confirmed: false
    })
    .eq("id", buyId);

  loadNotifications();
}

loadNotifications();
</script>

</body>
</html>
