<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
/* SAME UI AS BUY PAGE */
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
}
body.drawer-open { overflow: hidden; }

/* NAVBAR (UNCHANGED) */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 78px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom: 3px solid #0a3d62;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  z-index: 9999;
}

.nav-left { display: flex; align-items: center; gap: 14px; }

.hamburger-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 2px solid #0a3d62;
  background: rgba(255,255,255,0.75);
  display: grid;
  place-items: center;
  cursor: pointer;
}

.hamburger-icon {
  width: 20px; height: 14px; position: relative;
}
.hamburger-icon span {
  position: absolute; left: 0; right: 0;
  height: 2.5px; background: #0a3d62;
}
.hamburger-icon span:nth-child(1){ top:0; }
.hamburger-icon span:nth-child(2){ top:5.5px; }
.hamburger-icon span:nth-child(3){ top:11px; }

.brand-title { font-weight: 800; color: #0a3d62; }

.logout-btn {
  background: white;
  border: 2px solid #0a3d62;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
}

/* DRAWER SAME */
.nav-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.25);
  opacity: 0; pointer-events: none;
  transition: .2s;
  z-index: 9998;
}
.side-drawer {
  position: fixed;
  top: 84px; left: 14px;
  width: 320px;
  background: #0a3d62;
  border-radius: 18px;
  transform: translateX(-110%);
  transition: .25s;
  z-index: 9999;
}
body.drawer-open .nav-overlay { opacity: 1; pointer-events: auto; }
body.drawer-open .side-drawer { transform: translateX(0); }

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 140px auto;
  padding: 0 20px;
}

/* SECTION */
.section-header {
  background: #f1f5f9;
  padding: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
  border-radius: 10px;
}

.section-content {
  display: none;
}
.section-content.active {
  display: block;
}

/* GRID LIKE BUY PAGE */
.crop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap: 25px;
}

.crop-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
  border-top: 6px solid #ff9933;
  border-bottom: 6px solid #138808;
}

/* BUTTONS */
.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: 700;
}

.accept { background: #138808; }
.decline { background: #dc2626; }

</style>
</head>

<body>

<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn">
      <div class="hamburger-icon"><span></span><span></span><span></span></div>
    </button>
    <p class="brand-title">Krishi Mitr</p>
  </div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="nav-overlay" id="navOverlay"></div>
<nav class="side-drawer" id="sideNav"></nav>

<div class="container">

  <h2>Notifications</h2>

  <!-- Crop -->
  <div>
    <div class="section-header" onclick="toggle('cropContent')">Crop Sales ▼</div>
    <div id="cropContent" class="section-content">
      <div class="crop-grid" id="cropGrid"></div>
    </div>
  </div>

  <!-- Tool -->
  <div>
    <div class="section-header" onclick="toggle('toolContent')">Tool Rental ▼</div>
    <div id="toolContent" class="section-content">
      <p>Coming Soon</p>
    </div>
  </div>

</div>

<script>
const db = window.db;
const loginid = sessionStorage.getItem("loginid");
const usertype = sessionStorage.getItem("usertype");

if (!loginid) location.href = "login";

/* TOGGLE */
function toggle(id){
  document.getElementById(id).classList.toggle("active");
}

/* LOAD NOTIFICATIONS */
async function loadNotifications(){

  if(usertype !== "Farmer") return;

  const { data, error } = await db
    .from("buy_table")
    .select("*")
    .eq("fid", loginid)
    .eq("status","Pending");

  const grid = document.getElementById("cropGrid");
  grid.innerHTML = "";

  if(!data || data.length===0){
    grid.innerHTML = "<p>No notifications</p>";
    return;
  }

  data.forEach(item=>{

    const card = document.createElement("div");
    card.className="crop-card";

    card.innerHTML = `
      <h3>${item.cname}</h3>
      <p><b>Buyer:</b> ${item.buyer_name}</p>
      <p><b>Quantity:</b> ${item.quantity} kg</p>
      <p><b>Total:</b> ₹${item.total_price}</p>

      <div class="actions">
        <button class="btn accept" onclick="accept(${item.id}, ${item.cid}, ${item.quantity}, this)">Accept</button>
        <button class="btn decline" onclick="decline(${item.id}, this)">Decline</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ACCEPT */
async function accept(id,cropId,qty,btn){
  btn.disabled=true;

  await db.from("buy_table")
    .update({status:"Confirmed",is_confirmed:true})
    .eq("id",id);

  const {data:crop}=await db
    .from("crop_sales")
    .select("quantity")
    .eq("id",cropId)
    .single();

  const newQty = Math.max(0,crop.quantity-qty);

  await db.from("crop_sales")
    .update({quantity:newQty})
    .eq("id",cropId);

  loadNotifications();
}

/* DECLINE */
async function decline(id,btn){
  btn.disabled=true;

  await db.from("buy_table")
    .update({status:"Declined",is_confirmed:false})
    .eq("id",id);

  loadNotifications();
}

/* DRAWER */
const menuBtn=document.getElementById("menuBtn");
const sideNav=document.getElementById("sideNav");
const navOverlay=document.getElementById("navOverlay");

menuBtn.onclick=()=>{
  document.body.classList.toggle("drawer-open");
};
navOverlay.onclick=()=>document.body.classList.remove("drawer-open");

document.getElementById("logoutBtn").onclick=()=>{
  sessionStorage.clear();
  location.href="login";
};

loadNotifications();
</script>

</body>
</html>
