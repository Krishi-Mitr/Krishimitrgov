<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications - Krishi Mitr</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
body {
  margin: 0; font-family: "Poppins", Arial, sans-serif; min-height: 100vh;
  background: linear-gradient(180deg, #f6e2cc 0%, #f7f9f8 45%, #dceee3 100%);
  color: #1f2937; padding-top: 100px;
}
body.drawer-open { overflow: hidden; }
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; height: 78px;
  display: flex; justify-content: space-between; align-items: center; padding: 0 32px;
  background: linear-gradient(90deg, #ff9933, #ffffff, #138808);
  border-bottom: 3px solid #0a3d62; box-shadow: 0 6px 14px rgba(0,0,0,0.15); z-index: 9999;
}
.nav-left { display: flex; align-items: center; gap: 14px; }
.hamburger-btn {
  width: 44px; height: 44px; border-radius: 12px; border: 2px solid #0a3d62;
  background: rgba(255,255,255,0.75); display: grid; place-items: center; cursor: pointer;
}
.hamburger-icon { width: 20px; height: 14px; position: relative; }
.hamburger-icon span { position: absolute; left: 0; right: 0; height: 2.5px; background: #0a3d62; border-radius: 999px; }
.hamburger-icon span:nth-child(1){ top:0; } .hamburger-icon span:nth-child(2){ top:5.5px; } .hamburger-icon span:nth-child(3){ top:11px; }
.brand-title { margin: 0; font-size: 1.15rem; font-weight: 800; color: #0a3d62; }
.logout-btn {
  background: white; color: #0a3d62; border: 2px solid #0a3d62;
  padding: 10px 18px; border-radius: 10px; font-weight: 700; cursor: pointer;
}
.nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); opacity: 0; pointer-events: none; transition: 0.2s; z-index: 9998; }
.side-drawer {
  position: fixed; top: 84px; left: 14px; width: min(320px, calc(100vw - 28px));
  max-height: calc(100vh - 98px); overflow: auto; background: #0a3d62;
  border: 3px solid #ffffff; border-radius: 18px; transform: translateX(-110%); transition: 0.25s; z-index: 9999;
}
body.drawer-open .nav-overlay { opacity: 1; pointer-events: auto; }
body.drawer-open .side-drawer { transform: translateX(0); }
.menu-section { border-radius: 14px; border: 1px solid rgba(255,255,255,0.15); margin: 14px; background: rgba(255,255,255,0.05); }
.menu-section-title { padding: 12px 14px; color: white; font-weight: 800; }
.menu-list { list-style: none; padding: 0; margin: 0; }
.menu-list a { display: block; padding: 14px; text-decoration: none; color: white; font-weight: 600; }
.container { max-width: 800px; margin: auto; padding: 0 20px; }
.card {
  background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 6px solid #ff9933;
}
.actions { margin-top: 10px; display: flex; gap: 10px; }
.btn-accept { background: #138808; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
.btn-decline { background: #dc2626; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn"><div class="hamburger-icon"><span></span><span></span><span></span></div></button>
    <p class="brand-title">Krishi Mitr</p>
  </div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>
<div class="nav-overlay" id="navOverlay"></div>
<nav class="side-drawer" id="sideNav">
  <div class="menu-section">
    <div class="menu-section-title">Main</div>
    <ul class="menu-list"><li><a href="Dashboard">Dashboard</a></li></ul>
  </div>
  <div class="menu-section" id="marketSection" style="display:none;">
    <div class="menu-section-title">Market</div>
    <ul class="menu-list"><li><a href="Update_crops">Manage Your Crops</a></li><li><a href="Sell">Sell Your Crop</a></li></ul>
  </div>
  <div class="menu-section">
    <div class="menu-section-title">System</div>
    <ul class="menu-list"><li><a href="Notification">Notification</a></li><li><a href="Chat">Chat</a></li></ul>
  </div>
</nav>
<div class="container">
  <h2 style="color: #0a3d62; margin-bottom: 25px;">Notifications Hub</h2>
  <div id="notificationList"></div>
</div>
<script>
const menuBtn = document.getElementById("menuBtn"), sideNav = document.getElementById("sideNav"), navOverlay = document.getElementById("navOverlay"), logoutBtn = document.getElementById("logoutBtn"), listContainer = document.getElementById("notificationList");
function toggleDrawer(open) { document.body.classList.toggle("drawer-open", open); }
menuBtn.onclick = () => toggleDrawer(!document.body.classList.contains("drawer-open"));
navOverlay.onclick = () => toggleDrawer(false);
async function initializeApp() {
    const { data: { user } } = await db.auth.getUser();
    const backupId = sessionStorage.getItem("loginid");
    if (!user && !backupId) { window.location.href = "login.html"; return; }
    const activeId = user ? user.id : backupId;
    if (sessionStorage.getItem("usertype") === "Farmer") document.getElementById("marketSection").style.display = "block";
    logoutBtn.onclick = async () => { await db.auth.signOut(); sessionStorage.clear(); window.location.href = "login.html"; };
    const loadNotifications = async () => {
        const { data: notes } = await db.from("notifications").select("*").eq("user_id", activeId).eq("status", "Pending").order("created_at", { ascending: false });
        listContainer.innerHTML = notes?.length ? "" : '<div class="card">No new notifications.</div>';
        notes?.forEach(n => {
            const card = document.createElement("div");
            card.className = "card";
            card.style.borderLeftColor = n.tool_id ? '#138808' : '#ff9933';
            card.innerHTML = `<h4>${n.title}</h4><p>${n.message}</p>
                <div class="actions">
                    <button class="btn-accept" onclick="handleAction('${n.id}', ${n.buy_id}, ${n.tool_id}, 'Accepted')">Accept</button>
                    <button class="btn-decline" onclick="handleAction('${n.id}', ${n.buy_id}, ${n.tool_id}, 'Declined')">Decline</button>
                </div>`;
            listContainer.appendChild(card);
        });
    };
    window.handleAction = async (notifId, buyId, toolId, status) => {
        await db.from("notifications").update({ status: status, is_read: true }).eq("id", notifId);
        if (buyId) await db.from("buy_table").update({ status: status, is_confirmed: true }).eq("id", buyId);
        else if (toolId) await db.from("tool_rentals").update({ status: status, is_available: status !== 'Accepted' }).eq("id", toolId);
        loadNotifications();
    };
    db.channel('feed').on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, loadNotifications).subscribe();
    loadNotifications();
}
initializeApp();
</script>
</body>
</html>
