<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  margin:0;
  font-family:"Poppins", Arial;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
}

/* ================= NAVBAR (same as yours) ================= */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 78px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom: 3px solid #0a3d62;
  z-index: 9999;
}

.nav-left { display:flex; align-items:center; gap:14px; }

.hamburger-btn {
  width:44px; height:44px;
  border-radius:12px;
  border:2px solid #0a3d62;
  background:white;
  cursor:pointer;
}

.brand-title {
  font-weight:800;
  color:#0a3d62;
}

.nav-right { display:flex; gap:15px; align-items:center; }

.logout-btn {
  padding:10px 16px;
  border-radius:10px;
  border:2px solid #0a3d62;
  cursor:pointer;
}

/* ================= DRAWER ================= */
.side-drawer {
  position: fixed;
  top: 84px;
  left: 14px;
  width: 280px;
  background:#082032;
  border-radius:15px;
  padding:15px;
  transform: translateX(-120%);
  transition:.3s;
  z-index:9999;
}

body.drawer-open .side-drawer {
  transform: translateX(0);
}

.menu-list a {
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

/* ================= CONTENT ================= */
.container {
  max-width:1200px;
  margin:110px auto;
  padding:0 20px;
}

.page-title {
  font-size:26px;
  font-weight:800;
  color:#0a3d62;
  margin-bottom:20px;
}

/* section */
.section-title {
  font-size:20px;
  font-weight:700;
  margin:20px 0;
  color:#0a3d62;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
}

/* card */
.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
  border-top:5px solid #ff9933;
  border-bottom:5px solid #138808;
  transition:.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* badge */
.badge {
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  color:white;
  font-weight:700;
  margin-top:10px;
}

/* buttons */
.btn-row {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.accept { background:#16a34a; color:white; }
.decline { background:#dc2626; color:white; }

/* ================= POPUP ================= */
.popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.popup-box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
}

.popup-btn {
  margin:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <div class="nav-left">
    <button id="menuBtn" class="hamburger-btn">☰</button>
    <span class="brand-title">Krishi Mitr</span>
  </div>

  <div class="nav-right">
    <img src="profile_pic.png" width="40" style="border-radius:50%;cursor:pointer;">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- DRAWER -->
<div class="side-drawer" id="drawer">
  <div class="menu-list">
    <a href="Dashboard">Dashboard</a>
    <a href="Update_crops">Manage Crops</a>
    <a href="Sell">Sell Crop</a>
    <a href="Buy">Buy Crops</a>
    <a href="Notification">Notification</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="page-title">📢 Notifications</div>

  <div class="section-title">🌾 Crop Sale</div>
  <div id="cropBox" class="grid"></div>

  <div class="section-title">🔧 Tool Rental</div>
  <div class="grid"><p style="opacity:.6;">Coming soon...</p></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="popupText"></p>
    <button class="popup-btn accept" onclick="confirmAction()">Yes</button>
    <button class="popup-btn decline" onclick="closePopup()">Cancel</button>
  </div>
</div>

<script>
const db = window.db;
const loginid = Number(sessionStorage.getItem("loginid"));

let selectedOrder = null;
let actionType = "";

/* drawer */
document.getElementById("menuBtn").onclick = () => {
  document.body.classList.toggle("drawer-open");
};

/* logout */
function logout(){
  sessionStorage.clear();
  location.href="login";
}

/* load notifications */
async function loadNotifications(){

  const { data } = await db
    .from("buy_table")
    .select("*")
    .eq("fid", loginid)
    .order("id",{ascending:false});

  const box = document.getElementById("cropBox");
  box.innerHTML = "";

  data.forEach(o=>{

    let color="#f59e0b";
    if(o.status==="Confirmed") color="#16a34a";
    if(o.status==="Declined") color="#dc2626";

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${o.cname}</h3>
      <p><b>${o.buyer_name}</b> wants ${o.quantity} kg</p>
      <p>Total: ₹${o.total_price}</p>
      <span class="badge" style="background:${color}">
        ${o.status}
      </span>
    `;

    if(o.status==="Pending"){
      const btns=document.createElement("div");
      btns.className="btn-row";

      btns.innerHTML=`
        <button class="btn accept">Accept</button>
        <button class="btn decline">Decline</button>
      `;

      btns.children[0].onclick=()=>openPopup(o,"accept");
      btns.children[1].onclick=()=>openPopup(o,"decline");

      card.appendChild(btns);
    }

    box.appendChild(card);
  });
}

/* popup */
function openPopup(order,type){
  selectedOrder=order;
  actionType=type;

  document.getElementById("popupText").innerText =
    type==="accept" ? "Accept this order?" : "Decline this order?";

  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* confirm */
async function confirmAction(){

  if(actionType==="accept"){

    await db.from("buy_table")
      .update({status:"Confirmed",is_confirmed:true})
      .eq("id",selectedOrder.id);

    const {data:crop}=await db
      .from("crop_sales")
      .select("quantity")
      .eq("id",selectedOrder.cid)
      .single();

    const newQty = crop.quantity - selectedOrder.quantity;

    await db.from("crop_sales")
      .update({quantity:newQty})
      .eq("id",selectedOrder.cid);

  }

  if(actionType==="decline"){
    await db.from("buy_table")
      .update({status:"Declined"})
      .eq("id",selectedOrder.id);
  }

  closePopup();
  loadNotifications();
}

/* init */
loadNotifications();
</script>

</body>
</html>
