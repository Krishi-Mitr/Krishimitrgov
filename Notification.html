<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications - Krishi Mitr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: "Poppins", sans-serif;
  background: linear-gradient(180deg,#f6e2cc,#fff);
}

/* NAVBAR */
.navbar {
  height:60px;
  background:#2e7d32;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.menu-btn {
  font-size:22px;
  cursor:pointer;
}

.nav-right button {
  margin-left:10px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.profile-btn { background:#fff; color:#2e7d32; }
.logout-btn { background:#c62828; color:#fff; }

.profile-btn:hover { background:#e8f5e9; }
.logout-btn:hover { background:#b71c1c; }

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#388e3c;
  color:white;
  transition:0.3s;
  padding-top:60px;
}

.sidebar a {
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover {
  background:#2e7d32;
}

.sidebar.active { left:0; }

/* MAIN */
.container {
  padding:20px;
}

.heading {
  font-size:22px;
  margin-bottom:15px;
  font-weight:600;
}

/* CATEGORY BOX */
.category {
  background:#fff;
  border-radius:12px;
  margin-bottom:15px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.category:hover {
  transform:scale(1.01);
}

.category-title {
  font-size:18px;
  font-weight:600;
}

/* DROPDOWN CONTENT */
.content {
  max-height:0;
  overflow:hidden;
  transition:0.4s ease;
}

.content.active {
  max-height:500px;
  margin-top:10px;
}

/* NOTIFICATION CARD */
.card {
  background:#e8f5e9;
  border-left:5px solid #2e7d32;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.card.pending { background:#fff3cd; border-color:#f9a825; }
.card.accepted { background:#e8f5e9; border-color:#2e7d32; }
.card.declined { background:#ffebee; border-color:#c62828; }

.actions {
  margin-top:8px;
}

.actions button {
  padding:5px 10px;
  border:none;
  border-radius:6px;
  margin-right:5px;
  cursor:pointer;
}

.accept { background:#2e7d32; color:#fff; }
.decline { background:#c62828; color:#fff; }

/* POPUP */
.popup {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.popup-box button {
  margin:10px;
  padding:6px 12px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div>Notifications</div>
  <div class="nav-right">
    <button class="profile-btn">Profile</button>
    <button class="logout-btn">Logout</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#">Dashboard</a>
  <a href="#">Sell Crops</a>
  <a href="#">Buy Crops</a>
</div>

<!-- MAIN -->
<div class="container">

  <div class="heading">Notifications</div>

  <!-- Crop Sales -->
  <div class="category" onclick="toggleContent('cropContent')">
    <div class="category-title">Crop Sales</div>
    <div id="cropContent" class="content"></div>
  </div>

  <!-- Tool Rental -->
  <div class="category" onclick="toggleContent('toolContent')">
    <div class="category-title">Tool Rental</div>
    <div id="toolContent" class="content">
      <div class="card">No notifications yet</div>
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <p id="popupText"></p>
    <button onclick="confirmAction()">Yes</button>
    <button onclick="closePopup()">No</button>
  </div>
</div>

<script>
const loginid = sessionStorage.getItem("loginid");

let currentAction = null;
let selectedItem = null;

function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function toggleContent(id) {
  document.getElementById(id).classList.toggle("active");
}

/* LOAD NOTIFICATIONS */
async function loadNotifications() {
  const { data, error } = await db
    .from("buy_table")
    .select("*")
    .eq("fid", loginid);

  const container = document.getElementById("cropContent");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<div class='card'>No notifications</div>";
    return;
  }

  data.forEach(item => {
    let statusClass = "pending";
    if(item.status === "Accepted") statusClass = "accepted";
    if(item.status === "Declined") statusClass = "declined";

    const card = document.createElement("div");
    card.className = `card ${statusClass}`;

    card.innerHTML = `
      <b>${item.fname}</b> wants to buy <b>${item.cropname}</b><br>
      Quantity: ${item.quantity}<br>
      Status: ${item.status || "Pending"}

      ${item.status === "Pending" ? `
      <div class="actions">
        <button class="accept" onclick="openPopup('accept', ${item.id}, ${item.cid}, ${item.quantity})">Accept</button>
        <button class="decline" onclick="openPopup('decline', ${item.id})">Decline</button>
      </div>` : ""}
    `;

    container.appendChild(card);
  });
}

/* POPUP */
function openPopup(action, id, cid=null, qty=null) {
  currentAction = action;
  selectedItem = { id, cid, qty };

  document.getElementById("popupText").innerText =
    action === "accept" ? "Confirm Accept?" : "Confirm Decline?";

  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* CONFIRM */
async function confirmAction() {
  if(currentAction === "accept") {

    await db.from("buy_table")
      .update({ status: "Accepted" })
      .eq("id", selectedItem.id);

    /* reduce crop quantity */
    const { data } = await db
      .from("crop_sales")
      .select("quantity")
      .eq("id", selectedItem.cid)
      .single();

    let newQty = data.quantity - selectedItem.qty;

    await db.from("crop_sales")
      .update({ quantity: newQty })
      .eq("id", selectedItem.cid);

    alert("Order Confirmed");

  } else {

    await db.from("buy_table")
      .update({ status: "Declined" })
      .eq("id", selectedItem.id);

  }

  closePopup();
  loadNotifications();
}

loadNotifications();
</script>

</body>
</html>
