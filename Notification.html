
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
}

/* ===== NAVBAR (EXACT COPY STYLE) ===== */
body.drawer-open { overflow: hidden; }

.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 78px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(90deg,#ff9933,#ffffff,#138808);
  border-bottom: 3px solid #0a3d62;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  z-index: 9999;
}

.nav-left { display: flex; align-items: center; gap: 14px; }

.hamburger-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 2px solid #0a3d62;
  background: rgba(255,255,255,0.75);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: 0.3s;
}
.hamburger-btn:hover { transform: scale(1.05); }

.hamburger-icon {
  width: 20px;
  height: 14px;
  position: relative;
}
.hamburger-icon span {
  position: absolute;
  left: 0;
  right: 0;
  height: 2.5px;
  background: #0a3d62;
  border-radius: 999px;
}
.hamburger-icon span:nth-child(1){ top:0; }
.hamburger-icon span:nth-child(2){ top:5.5px; }
.hamburger-icon span:nth-child(3){ top:11px; }

.brand-title {
  font-weight: 800;
  color: #0a3d62;
}

.nav-right { display: flex; align-items: center; gap: 15px; }

.profile-btn img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid #0a3d62;
  cursor: pointer;
  transition: 0.3s;
}
.profile-btn img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(10,61,98,0.4);
}

.logout-btn {
  background: white;
  color: #0a3d62;
  border: 2px solid #0a3d62;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}
.logout-btn:hover {
  background: #0a3d62;
  color: white;
  transform: translateY(-2px);
}

/* ===== DRAWER ===== */
.nav-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  transition: .2s;
  z-index: 9998;
}

.side-drawer {
  position: fixed;
  top: 84px;
  left: 14px;
  width: min(320px, calc(100vw - 28px));
  max-height: calc(100vh - 98px);
  overflow: auto;
  background: linear-gradient(180deg,#0a3d62,#082032);
  border: 3px solid #ffffff;
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  transform: translateX(-110%);
  transition: transform .25s ease;
  z-index: 9999;
}

body.drawer-open .nav-overlay { opacity:1; pointer-events:auto; }
body.drawer-open .side-drawer { transform:translateX(0); }

.menu-list a {
  display:block;
  padding:14px;
  color:white;
  text-decoration:none;
}
.menu-list a:hover { background:#1e3a8a; }

/* ===== CONTENT ===== */
.container {
  max-width: 1200px;
  margin: 110px auto 40px; /* fixed top spacing */
  padding: 0 20px;
}

  body {
  margin: 0;
  font-family: "Poppins", Arial;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
  min-height: 100vh;
  overflow-x: hidden; /* prevents side overlap */
}
.title {
  font-size: 24px;
  font-weight: 800;
  color: #0a3d62;
  margin-bottom: 20px;
}

/* dropdown */
.dropdown {
  margin-bottom: 30px; /* increased spacing */
  border-radius: 12px;
  overflow: hidden;
}

.dropdown-header {
  background: #0a3d62;
  color: white;
  padding: 14px;
  font-weight: 700;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  padding-top: 15px;
}
  .no-data {
  text-align: center;
  padding: 30px;
  font-weight: 600;
  color: #6b7280;
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap: 25px;
}

/* card (same style as buy) */
.card {
  background: white;
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
  border-top: 6px solid #ff9933;
  border-bottom: 6px solid #138808;
}

.badge {
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  color:white;
  font-weight:700;
  margin-top:10px;
}

.btn-row {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.accept { background:#16a34a; color:white; }
.decline { background:#dc2626; color:white; }

/* popup */
.popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 99999;
}

.popup-box {
  background: linear-gradient(180deg,#e8f5e9,#ffffff);
  padding: 28px;
  border-radius: 18px;
  text-align:center;
  width: 320px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  border-top: 5px solid #16a34a;
}

.popup-box p {
  font-weight: 600;
  margin-bottom: 20px;
  color: #0a3d62;
}

.popup-box button {
  margin: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

.popup-box button:first-child {
  background: #16a34a;
  color: white;
}

.popup-box button:last-child {
  background: #e5e7eb;
}

.popup-box button:hover {
  transform: scale(1.05);
}

  .dropdown-content {
  display: none;
  padding-top: 15px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(-5px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
  <div class="nav-left">
    <button class="hamburger-btn" id="menuBtn">
      <div class="hamburger-icon"><span></span><span></span><span></span></div>
    </button>
    <span class="brand-title">Krishi Mitr</span>
  </div>

  <div class="nav-right">
    <div class="profile-btn">
      <img src="profile_pic.png">
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="nav-overlay" id="navOverlay" hidden></div>

<nav class="side-drawer" id="sideNav" hidden>
  <div class="drawer-inner">
    
    <div class="menu-section" id="marketSection" style="display:none;">
      <div class="menu-section-title">Market</div>
      <ul class="menu-list">
        <li><a href="Update_crops">Manage Your Crops</a></li>
        <li><a href="Sell">Sell Your Crop</a></li>
      </ul>
    </div>

    <div class="menu-section">
      <div class="menu-section-title">Tools & Services</div>
      <ul class="menu-list">
        <li><a href="Buy">Buy Crops</a></li>
        <li><a href="#">Rent Tools & Machinery</a></li>
        <li><a href="#">Crop Predictor</a></li>
        <li><a href="#">Crop Advisor</a></li>
      </ul>
    </div>

    <div class="menu-section" style="margin-bottom:0;">
      <div class="menu-section-title">System</div>
      <ul class="menu-list">
        <li><a href="Notification">Notification</a></li>
        <li><a href="#">Chat</a></li>
      </ul>
    </div>

  </div>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="title">Notifications</div>

  <!-- Crop Sale -->
  <div class="dropdown">
    <div class="dropdown-header" onclick="toggle('tableContent')">
      Crop Sale
    </div>
   <!-- <div id="cropContent" class="dropdown-content grid"></div>-->
    <div id="tableContent" class="dropdown-content" style="display:none;"></div>
     <table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
    <thead>
      <tr style="background:#0a3d62; color:white;">
        <th>Crop</th>
        <th>Buyer</th>
        <th>Quantity (kg)</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>

  <div id="noDataMsg" class="no-data" style="display:none;">
    No Notifications
  </div>
  </div>

  <!-- Tool Rental -->
  <div class="dropdown">
    <div class="dropdown-header" onclick="toggle('toolContent')">
      Tool Rental
    </div>
    <div id="toolContent" class="dropdown-content">
      <p style="padding:10px;">No data</p>
    </div>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="popupText"></p>
    <button onclick="confirmAction()">Yes</button>
    <button onclick="closePopup()">Cancel</button>
  </div>
</div>

<script>
const db = window.db;
const loginid = Number(sessionStorage.getItem("loginid"));

let selectedOrder=null;
let actionType="";

/* drawer */
const menuBtn = document.getElementById("menuBtn");
const sideNav = document.getElementById("sideNav");
const navOverlay = document.getElementById("navOverlay");

function openDrawer(){
  document.body.classList.add("drawer-open");
  sideNav.hidden=false;
  navOverlay.hidden=false;
}

function closeDrawer(){
  document.body.classList.remove("drawer-open");
  setTimeout(()=>{
    if(!document.body.classList.contains("drawer-open")){
      sideNav.hidden=true;
      navOverlay.hidden=true;
    }
  },220);
}

menuBtn.onclick=()=>{
  document.body.classList.contains("drawer-open") ? closeDrawer() : openDrawer();
};

navOverlay.onclick=closeDrawer;

logoutBtn.onclick=()=>{
  sessionStorage.clear();
  location.href="login";
};

/* dropdown */
function toggle(id){
  const el = document.getElementById(id);

  if(el.style.display === "none" || el.style.display === ""){
    if(id === "tableContent"){
      el.style.display = "block";
    } else {
      el.style.display = "block";
    }
  } else {
    el.style.display = "none";
  }
}

/* load */
async function loadNotifications(){

  const {data}=await db
    .from("buy_table")
    .select("*")
    .eq("fid",loginid)
    .order("id",{ascending:false});

 // const box=document.getElementById("cropContent");
 // box.innerHTML="";

  // ✅ SHOW EMPTY MESSAGE
 /* if(!data || data.length === 0){
    box.style.display = "block";
    box.innerHTML = `<div class="no-data">No Notifications</div>`;
    return;
  }*/

  const box = document.getElementById("ordersTable");
const noData = document.getElementById("noDataMsg");

box.innerHTML = "";

// ✅ SHOW EMPTY MESSAGE
if (!data || data.length === 0) {
  noData.style.display = "block";
  return;
} else {
  noData.style.display = "none";
}

data.forEach(o => {

  let color = "#0a3d62";
  if (o.status === "Confirmed") color = "#16a34a";
  if (o.status === "Declined") color = "#dc2626";

  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${o.cname}</td>
    <td>${o.buyer_name}</td>
    <td>${o.quantity}</td>
    <td>
      <span style="
        background:${color};
        color:white;
        padding:5px 10px;
        border-radius:6px;
        font-weight:bold;
      ">
        ${o.status}
      </span>
    </td>
    <td class="action-cell"></td>
  `;

  // ✅ Buttons for pending
  if (o.status === "Pending") {
    const actionCell = row.querySelector(".action-cell");

    const acceptBtn = document.createElement("button");
    acceptBtn.innerText = "Accept";
    acceptBtn.style.marginRight = "5px";
    acceptBtn.onclick = () => openPopup(o, "accept");

    const declineBtn = document.createElement("button");
    declineBtn.innerText = "Decline";
    declineBtn.onclick = () => openPopup(o, "decline");

    actionCell.appendChild(acceptBtn);
    actionCell.appendChild(declineBtn);
  }

  box.appendChild(row);
});
  /*data.forEach(o=>{

    let color="#0a3d62";
    if(o.status==="Confirmed") color="#16a34a";
    if(o.status==="Declined") color="#dc2626";

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${o.cname}</h3>
      <p>Buyer: ${o.buyer_name}</p>
      <p>Quantity: ${o.quantity} kg</p>
      <span class="badge" style="background:${color}">
        ${o.status}
      </span>
    `;

    if(o.status==="Pending"){
      const btns=document.createElement("div");
      btns.className="btn-row";

      btns.innerHTML=`
        <button class="btn accept">Accept</button>
        <button class="btn decline">Decline</button>
      `;

      btns.children[0].onclick=()=>openPopup(o,"accept");
      btns.children[1].onclick=()=>openPopup(o,"decline");

      card.appendChild(btns);
    }

    box.appendChild(card);
  });
}*/

/* popup */
function openPopup(order,type){
  selectedOrder=order;
  actionType=type;
  popupText.innerText = type==="accept" ? "Accept order?" : "Decline order?";
  popup.style.display="flex";
}

function closePopup(){
  popup.style.display="none";
}

/* confirm */
async function confirmAction(){

  if(actionType==="accept"){
    await db.from("buy_table")
      .update({status:"Confirmed"})
      .eq("id",selectedOrder.id);

    const {data:crop}=await db
      .from("crop_sales")
      .select("quantity")
      .eq("id",selectedOrder.cid)
      .single();

    const newQty = crop.quantity - selectedOrder.quantity;

    await db.from("crop_sales")
      .update({quantity:newQty})
      .eq("id",selectedOrder.cid);
  }

  if(actionType==="decline"){
    await db.from("buy_table")
      .update({status:"Declined"})
      .eq("id",selectedOrder.id);
  }

  closePopup();
  loadNotifications();
}

loadNotifications();
</script>

</body>
</html>
