<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmer Notifications</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  margin:0;
  font-family:"Poppins", Arial;
  background: linear-gradient(180deg,#f6e2cc 0%,#f7f9f8 45%,#dceee3 100%);
}

/* container */
.container {
  max-width:1200px;
  margin:120px auto;
  padding:0 20px;
}

/* grid (same BUY page) */
.crop-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
}

/* card */
.crop-card {
  background:white;
  border-radius:25px;
  padding:20px;
  box-shadow:0 18px 40px rgba(0,0,0,0.15);
  border-top:6px solid #ff9933;
  border-bottom:6px solid #138808;
  transition:.3s;
}

.crop-card:hover {
  transform:translateY(-5px);
}

/* badge */
.badge {
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  color:white;
  font-weight:700;
  margin-top:10px;
}

/* buttons */
.btn-row {
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.btn {
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  width:48%;
}

.accept { background:#16a34a; color:white; }
.decline { background:#dc2626; color:white; }

/* popup */
.popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="color:#0a3d62;">📢 Incoming Orders</h2>
  <div id="notifBox" class="crop-grid"></div>
</div>

<!-- CONFIRM POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p>Do you want to accept this order?</p>
    <button onclick="confirmAccept()">Yes</button>
    <button onclick="closePopup()">No</button>
  </div>
</div>

<script>
const db = window.db;
const loginid = Number(sessionStorage.getItem("loginid"));

if (!loginid) {
  location.href = "login";
}

let selectedOrder = null;

// 🔥 LOAD NOTIFICATIONS
async function loadNotifications() {

  const { data, error } = await db
    .from("buy_table")
    .select("*")
    .eq("fid", loginid) // ONLY farmer orders
    .order("id", { ascending:false });

  console.log("DATA:", data);

  const box = document.getElementById("notifBox");
  box.innerHTML = "";

  if (!data || data.length === 0) {
    box.innerHTML = "<p>No orders yet</p>";
    return;
  }

  data.forEach(order => {

    let badgeColor = "#f59e0b";

    if (order.status === "Confirmed") badgeColor = "#16a34a";
    if (order.status === "Declined") badgeColor = "#dc2626";

    const card = document.createElement("div");
    card.className = "crop-card";

    card.innerHTML = `
      <h3>${order.cname}</h3>
      <p><b>Buyer:</b> ${order.buyer_name}</p>
      <p><b>Quantity:</b> ${order.quantity} kg</p>
      <p><b>Total:</b> ₹${order.total_price}</p>

      <p style="margin-top:10px;">
        ${order.buyer_name} wants to buy ${order.quantity} kg of ${order.cname}
      </p>

      <span class="badge" style="background:${badgeColor}">
        ${order.status}
      </span>
    `;

    // 🔥 SHOW BUTTONS ONLY IF PENDING
    if (order.status === "Pending") {

      const btns = document.createElement("div");
      btns.className = "btn-row";

      btns.innerHTML = `
        <button class="btn accept">Accept</button>
        <button class="btn decline">Decline</button>
      `;

      btns.querySelector(".accept").onclick = () => openPopup(order);
      btns.querySelector(".decline").onclick = () => declineOrder(order);

      card.appendChild(btns);
    }

    box.appendChild(card);
  });
}

// 🔥 OPEN POPUP
function openPopup(order) {
  selectedOrder = order;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// 🔥 ACCEPT ORDER
async function confirmAccept() {

  const order = selectedOrder;

  try {

    // ✅ update order
    await db.from("buy_table")
      .update({ status:"Confirmed", is_confirmed:true })
      .eq("id", order.id);

    // ✅ get crop
    const { data: crop } = await db
      .from("crop_sales")
      .select("quantity")
      .eq("id", order.cid)
      .single();

    const newQty = crop.quantity - order.quantity;

    // ✅ update crop quantity
    await db.from("crop_sales")
      .update({ quantity: newQty })
      .eq("id", order.cid);

    alert("Order Confirmed!");

  } catch (err) {
    console.error(err);
    alert("Error occurred");
  }

  closePopup();
  loadNotifications();
}

// 🔥 DECLINE ORDER
async function declineOrder(order) {

  await db.from("buy_table")
    .update({ status:"Declined" })
    .eq("id", order.id);

  alert("Order Declined");
  loadNotifications();
}

// INIT
loadNotifications();
</script>

</body>
</html>
